<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الكليات الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

        :root {
            --primary-bg: #000000;
            --accent-color: #d4a373; /* Golden/Beige from image */
            --text-color: #ffffff;
            --bubble-bg: #1a1a1a;
            --border-color: #333333;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        body.light-mode {
            --primary-bg: #f5f5dc;
            --text-color: #1a1a1a;
            --border-color: #d4a373;
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .header-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-color);
        }

        .icon-btn {
            color: var(--accent-color);
            font-size: 1.2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background: rgba(212, 163, 115, 0.1);
        }

        /* Chat Window */
        #chat-window {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Message Bubble - Matching the Image UI */
        .bot-bubble {
            background-color: transparent;
            border: 1px solid var(--accent-color);
            border-radius: 20px;
            border-top-right-radius: 4px;
            padding: 18px;
            max-width: 90%;
            align-self: flex-start;
            line-height: 1.7;
            font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .user-bubble {
            background-color: var(--accent-color);
            color: #000;
            border-radius: 20px;
            border-top-left-radius: 4px;
            padding: 12px 18px;
            max-width: 80%;
            align-self: flex-end;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(212, 163, 115, 0.2);
        }

        /* Formatting Report Sections */
        .report-section {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed rgba(212, 163, 115, 0.3);
        }
        .report-section:last-child { border: none; }
        .section-title {
            color: var(--accent-color);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        /* Input Area */
        .input-container {
            padding: 15px 20px 25px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: var(--primary-bg);
            border-top: 1px solid var(--border-color);
        }

        .send-btn {
            background-color: var(--accent-color);
            color: #000;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .send-btn:active { transform: scale(0.9); }

        .text-input-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            background-color: #121212;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 15px;
        }

        body.light-mode .text-input-wrapper {
            background-color: #fff;
        }

        .text-input-wrapper input {
            background: transparent;
            border: none;
            color: var(--text-color);
            flex-grow: 1;
            outline: none;
            font-size: 1rem;
            padding: 8px 0;
        }

        .mic-icon {
            color: var(--accent-color);
            font-size: 1.2rem;
            margin-right: 10px;
            cursor: pointer;
        }

        /* Loading Animation */
        .typing {
            display: flex;
            gap: 4px;
            padding: 5px;
        }
        .typing span {
            width: 6px;
            height: 6px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: bounce 1s infinite ease-in-out;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

    </style>
</head>
<body>

    <header>
        <div class="icon-btn" onclick="toggleTheme()">
            <i id="theme-icon" class="fas fa-moon"></i>
        </div>
        <div class="header-title">دليل الكليات الذكي</div>
        <div class="icon-btn">
            <i class="fas fa-cubes"></i>
        </div>
    </header>

    <main id="chat-window">
        <!-- Initial Message -->
        <div class="bot-bubble">
            <div class="section-title"><i class="fas fa-graduation-cap"></i> مرحباً بك!</div>
            أنا هنا لمساعدتك في استكشاف مستقبلك الأكاديمي. اسأل عن أي كلية أو معهد (مثلاً: "هندسة القاهرة" أو "معهد الفنون المسرحية") وسأقوم بتوليد تقرير تفصيلي يغطي كل ما تحتاجه.
        </div>
    </main>

    <div class="input-container">
        <div class="send-btn" onclick="sendMessage()">
            <i class="fas fa-paper-plane transform rotate-[210deg]"></i>
        </div>

        <div class="text-input-wrapper">
            <i class="fas fa-microphone mic-icon" id="mic-btn" onclick="startVoice()"></i>
            <input type="text" id="user-input" placeholder="اسأل عن كلية وسنة محددة..." autocomplete="off">
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            icon.className = document.body.classList.contains('light-mode') ? 'fas fa-sun' : 'fas fa-moon';
        }

        // Voice Support
        function startVoice() {
            if (!('webkitSpeechRecognition' in window)) {
                showModal("عذراً، متصفحك لا يدعم خاصية البحث الصوتي.");
                return;
            }
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.onstart = () => { document.getElementById('mic-btn').style.color = '#ef4444'; };
            recognition.onresult = (event) => {
                userInput.value = event.results[0][0].transcript;
                sendMessage();
            };
            recognition.onend = () => { document.getElementById('mic-btn').style.color = 'var(--accent-color)'; };
            recognition.start();
        }

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        async function sendMessage() {
            const query = userInput.value.trim();
            if (!query) return;

            appendMessage('user', query);
            userInput.value = '';

            const loadingId = appendLoading();

            try {
                const report = await getCollegeReport(query);
                removeLoading(loadingId);
                appendMessage('bot', report, true);
            } catch (error) {
                removeLoading(loadingId);
                appendMessage('bot', "حدث خطأ أثناء جلب البيانات. يرجى التأكد من اتصالك بالإنترنت والمحاولة مرة أخرى.");
            }
        }

        async function getCollegeReport(query) {
            const systemPrompt = `أنت مساعد تعليمي متخصص. عندما يسألك المستخدم عن كلية أو معهد، يجب أن تولد تقريراً دقيقاً ومنظماً باستخدام العناصر التالية تماماً:
            1. نبذة عن الكلية أو المعهد.
            2. المجموع يتراوح من (تقديري بناءً على السنوات الأخيرة).
            3. مدة الدراسة وطبيعتها (نظري/عملي).
            4. لغة ونظام الدراسة (ساعات معتمدة، ترمات، إلخ).
            5. أهم المواد التي سيتم دراستها.
            6. مرحلة التدريب ومجالات العمل بعد التخرج.
            7. المميزات.
            8. العيوب (من تنفع له ومن لا تنفع له).
            9. الخلاصة.
            استخدم أيقونات بسيطة لكل قسم ونسق النص ليكون سهل القراءة.`;

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: query }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (e) {
                    if (i === 4) throw e;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        function appendMessage(sender, text, isReport = false) {
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'user-bubble' : 'bot-bubble';
            
            if (isReport) {
                // Formatting the markdown-like response into structured HTML
                const lines = text.split('\n');
                let htmlContent = '';
                lines.forEach(line => {
                    if (line.trim().startsWith('*') || line.match(/^\d\./)) {
                        htmlContent += `<div class="report-section">${line.replace(/[\*\#]/g, '')}</div>`;
                    } else {
                        htmlContent += `<div>${line}</div>`;
                    }
                });
                div.innerHTML = htmlContent;
            } else {
                div.innerText = text;
            }

            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendLoading() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'bot-bubble';
            div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return id;
        }

        function removeLoading(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function showModal(msg) {
            const div = document.createElement('div');
            div.style = "position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:var(--accent-color); color:#000; padding:20px; border-radius:10px; z-index:100; font-weight:bold;";
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
    </script>
</body>
</html>
