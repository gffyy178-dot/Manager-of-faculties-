<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الكليات الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #000000;
            --text-color: #f5f5dc; /* Beige */
            --accent-color: #d4a373;
            --card-bg: #121212;
            --user-msg: #d4a373;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: 0.3s ease;
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            overflow: hidden;
        }

        .light-mode {
            --bg-color: #fdfaf1;
            --text-color: #2c1e11;
            --accent-color: #8b5e34;
            --card-bg: #ffffff;
            --user-msg: #8b5e34;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .msg {
            margin-bottom: 25px;
            max-width: 92%;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-msg {
            align-self: flex-start;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px 20px 0 20px;
            border: 1px solid var(--accent-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .user-msg {
            align-self: flex-end;
            background: var(--user-msg);
            color: #000;
            padding: 12px 20px;
            border-radius: 20px 20px 20px 0;
            margin-right: auto;
            font-weight: 600;
        }

        .report-section { margin-top: 15px; border-right: 3px solid var(--accent-color); padding-right: 15px; }
        .report-title { color: var(--accent-color); font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        
        .input-box {
            background: var(--card-bg);
            padding: 15px 25px;
            border-top: 2px solid var(--accent-color);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .icon-btn {
            color: var(--accent-color);
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
            width: 45px; height: 45px;
            display: grid; place-items: center;
            border-radius: 50%;
        }

        .icon-btn:hover { background: rgba(212, 163, 115, 0.15); transform: scale(1.1); }

        .sidebar {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background: var(--card-bg); z-index: 100; transition: 0.3s;
            padding: 30px; box-shadow: -5px 0 20px rgba(0,0,0,0.5);
        }
        .sidebar.open { right: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 90; }

        .recording { animation: pulse 1s infinite; color: #ff4444 !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        input { background: transparent; border: none; outline: none; color: inherit; width: 100%; font-size: 1.1rem; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-4 border-b border-accent-color/20 flex justify-between items-center backdrop-blur-md sticky top-0 bg-black/40">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="icon-btn"><i class="fas fa-boxes-stacked"></i></button>
            <h1 class="text-xl font-bold">دليل الكليات <span class="text-accent-color">الذكي</span></h1>
        </div>
        <button onclick="toggleTheme()" class="icon-btn" id="themeIco"><i class="fas fa-moon"></i></button>
    </header>

    <!-- Sidebar -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <h2 class="text-xl font-bold mb-8 border-b border-accent-color pb-2">مستلزمات الدردشة</h2>
        <div class="space-y-6">
            <div class="flex items-center gap-3 cursor-pointer"><i class="fas fa-file-export"></i> تصدير التقرير PDF</div>
            <div class="flex items-center gap-3 cursor-pointer"><i class="fas fa-star"></i> الكليات المفضلة</div>
            <div class="flex items-center gap-3 cursor-pointer"><i class="fas fa-calculator"></i> احسب مجموعك</div>
            <div class="flex items-center gap-3 cursor-pointer"><i class="fas fa-microphone-lines"></i> إعدادات الصوت</div>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area flex flex-col" id="chatArea">
        <div class="msg bot-msg">
            مرحباً بك في دليل الكليات الذكي! 🎓<br>
            يمكنك سؤالي عن أي كلية في سنة محددة (مثلاً: هندسة البترول سنة 2024). سأقوم فوراً بتوليد تقرير كامل لك.
        </div>
    </div>

    <div id="voiceIndicator" class="hidden text-center text-red-500 font-bold mb-2 animate-pulse">
        <i class="fas fa-microphone"></i> جاري الاستماع إليك...
    </div>

    <!-- Input -->
    <div class="input-box">
        <button class="icon-btn" id="micBtn" title="تحدث بالصوت"><i class="fas fa-microphone"></i></button>
        <input type="text" id="userInput" placeholder="اسأل عن كلية وسنة محددة..." onkeypress="if(event.key==='Enter') startAnalysis()">
        <button onclick="startAnalysis()" class="icon-btn" style="background:var(--accent-color); color:#000; border-radius:12px">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            document.getElementById('themeIco').innerHTML = document.body.classList.contains('light-mode') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        }

        const reports = {
            "هندسة البترول": {
                intro: "الكلية اللي بتشم فيها ريحة النفط والدولارات",
                scores: "94% لـ 96%",
                duration: "5 سنين: أول سنة إعدادي هندسة، بعدها 4 سنين تخصص.",
                language: "بالإنجليزي، مصطلحات تقيلة (جيولوجيا، حفر، خزانات).",
                subjects: ["جيولوجيا النفط", "هندسة الحفر", "تكرير البترول", "اقتصاديات البترول"],
                training: "شركات مثل (خالدة، قارون، جابكو، بتروجيت).",
                jobs: "مهندس إنتاج، مهندس حفر، تطوير خزانات، سفر للخليج بمرتبات عالية.",
                pros: "مرتبات جامدة، سفر ومغامرة، مستقبل مطلوب عالمياً.",
                cons: "إرهاق، ساعات طويلة في الصحراء، خطر المعدات التقيلة.",
                who: "تنفع للي بيحب المغامرة والصحراء، ما تنفعش للي عايز مكتب مكيّف وروتين.",
                summary: "من أجمد وأعلى التخصصات دخلاً، بس مش سهلة ومش مريحة."
            },
            "هندسة": {
                intro: "مصنع المبدعين وبناة المستقبل",
                scores: "91% لـ 93%",
                duration: "5 سنين: سنة إعدادي و4 تخصص.",
                language: "بالإنجليزي في أغلب الأقسام.",
                subjects: ["رياضيات متقدمة", "فيزياء هندسية", "ميكانيكا", "تخصص القسم"],
                training: "شركات المقاولات، المصانع، أو شركات التكنولوجيا حسب القسم.",
                jobs: "مهندس تصميم، مهندس موقع، أو مبرمج في أقسام الحاسبات.",
                pros: "مكانة اجتماعية مرموقة، تنوع كبير في التخصصات.",
                cons: "دراسة صعبة ومحتاجة صبر ومذاكرة طول السنة.",
                who: "تنفع للي دماغه رياضية وبيحب يحل المشاكل، ما تنفعش للي بيكره الحسابات.",
                summary: "العمود الفقري لأي نهضة، لو دخلتها لازم تتعب عشان تتميز."
            }
        };

        function startAnalysis() {
            const query = userInput.value.trim();
            if(!query) return;

            addMsg(query, 'user');
            
            // Extracting Year from Query
            const yearMatch = query.match(/\d{4}/);
            const year = yearMatch ? yearMatch[0] : "الحالية";
            
            userInput.value = "";

            setTimeout(() => {
                let response = "";
                if(query.includes("بترول")) {
                    response = generateReport(reports["هندسة البترول"], "هندسة البترول", year);
                } else if(query.includes("هندسة")) {
                    response = generateReport(reports["هندسة"], "الهندسة العامة", year);
                } else {
                    response = `عذراً، جاري تحديث بيانات هذه الكلية لسنة ${year}. جرب حالياً الاستفسار عن (هندسة البترول) أو (الهندسة).`;
                }
                addMsg(response, 'bot');
            }, 600);
        }

        function generateReport(data, name, year) {
            return `
                <div class="font-bold text-xl mb-3 text-accent-color">🔴 كلية ${name}</div>
                <p class="italic mb-4">(${data.intro})</p>
                <p>- مجموعها في الغالب عالي، بيقفل حوالين ${data.scores} حسب تنسيق سنة ${year}.</p>

                <div class="report-section">
                    <div class="report-title">🔵 مدة الدراسة وطبيعتها</div>
                    <p>${data.duration}</p>
                </div>

                <div class="report-section">
                    <div class="report-title">🔵 لغة ونظام الدراسة</div>
                    <p>${data.language}</p>
                </div>

                <div class="report-section">
                    <div class="report-title">🔵 أهم المواد اللي هتدرسها</div>
                    <ul class="list-disc pr-5">${data.subjects.map(s => `<li>${s}</li>`).join('')}</ul>
                </div>

                <div class="report-section">
                    <div class="report-title">🔵 مرحلة التدريب</div>
                    <p>${data.training}</p>
                </div>

                <div class="report-section">
                    <div class="report-title">🔵 مجالات العمل بعد التخرج</div>
                    <p>${data.jobs}</p>
                </div>

                <div class="report-section">
                    <div class="report-title">🔵 مميزاتها وعيوبها</div>
                    <p><strong>المميزات:</strong> ${data.pros}</p>
                    <p><strong>العيوب:</strong> ${data.cons}</p>
                </div>

                <div class="report-section">
                    <div class="report-title">🔵 مين تنفع له؟</div>
                    <p>${data.who}</p>
                </div>

                <div class="report-section">
                    <div class="report-title">🔵 الخلاصة</div>
                    <p>${data.summary}</p>
                </div>

                <p class="mt-4 text-blue-400 font-bold">يارب نولها لكل طالب تعب واجتهد وسعى ليها 💙</p>
                <p class="text-xs mt-2 opacity-60">#معلومات_عن_الكليات</p>
                <div class="text-[10px] mt-1 border-t border-accent-color/10 pt-1 italic text-center">التنسيق حسب سنة ${year}</div>
            `;
        }

        function addMsg(content, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}-msg`;
            div.innerHTML = content;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Voice Support
        if ('webkitSpeechRecognition' in window) {
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'ar-SA';
            
            document.getElementById('micBtn').addEventListener('click', () => {
                recognition.start();
                document.getElementById('micBtn').classList.add('recording');
                document.getElementById('voiceIndicator').classList.remove('hidden');
            });

            recognition.onresult = (e) => {
                userInput.value = e.results[0][0].transcript;
                startAnalysis();
            };

            recognition.onend = () => {
                document.getElementById('micBtn').classList.remove('recording');
                document.getElementById('voiceIndicator').classList.add('hidden');
            };
        }
    </script>
</body>
</html>
